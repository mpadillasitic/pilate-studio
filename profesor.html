<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portal Profesor — Lumina Pilates</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --cream:         #FAF7F2;
      --warm-white:    #FDFCFA;
      --stone-light:   #EDE8DE;
      --stone:         #C4B89A;
      --stone-dark:    #8C7A5E;
      --charcoal:      #1C1C1A;
      --charcoal-soft: #2E2E2B;
      --charcoal-mid:  #4A4A45;
      --gold:          #C9A96E;
      --gold-muted:    #A08545;
      --gold-light:    #E8D5B0;
      --sage:          #7A8C74;
      --sage-light:    #B8C4B2;
      --sage-pale:     #E8EDE6;
      --sidebar-bg:    #1a2e1f;
      --radius:        12px;
      --radius-sm:     8px;
      --shadow-card:   0 4px 40px rgba(28,28,26,0.08);
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--charcoal);font-size:14px;-webkit-font-smoothing:antialiased}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--stone-light);border-radius:4px}

    /* LAYOUT */
    #app{display:flex;height:100vh;overflow:hidden}

    /* SIDEBAR */
    .sidebar{width:220px;flex-shrink:0;background:var(--sidebar-bg);display:flex;flex-direction:column;overflow-y:auto}
    .sidebar-logo{padding:26px 20px 18px;border-bottom:1px solid rgba(196,184,154,0.1)}
    .sidebar-logo .wordmark{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;letter-spacing:.08em;color:rgba(250,247,242,.88)}
    .sidebar-logo .sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--stone);margin-top:3px}
    .nav-section{padding:16px 12px 0}
    .nav-label{font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:rgba(196,184,154,.4);padding:0 8px;margin-bottom:6px;font-weight:500}
    .nav-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--radius-sm);cursor:pointer;color:rgba(250,247,242,.5);font-size:13px;transition:all .2s;border:none;background:none;width:100%;text-align:left}
    .nav-item:hover{background:rgba(250,247,242,.04);color:rgba(250,247,242,.75)}
    .nav-item.active{background:rgba(250,247,242,.09);color:rgba(250,247,242,.9)}
    .nav-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;opacity:.5}
    .nav-item.active .nav-dot{background:var(--gold);opacity:1}
    .nav-badge{margin-left:auto;background:#c0392b;color:#fff;font-size:10px;padding:1px 6px;border-radius:99px;min-width:18px;text-align:center}
    .nav-spacer{flex:1}
    .sidebar-user{padding:14px;border-top:1px solid rgba(196,184,154,.1);display:flex;align-items:center;gap:10px}
    .avatar-sm{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--stone-dark),var(--gold-muted));display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;color:var(--cream);flex-shrink:0}
    .user-name{font-size:12px;color:rgba(250,247,242,.8);font-weight:500}
    .user-role{font-size:10px;color:var(--stone);margin-top:1px;letter-spacing:.06em}
    .btn-logout{margin-left:auto;background:none;border:none;color:rgba(196,184,154,.4);cursor:pointer;font-size:14px;padding:4px 6px;border-radius:6px;transition:all .2s}
    .btn-logout:hover{color:rgba(250,247,242,.6)}

    /* MAIN */
    .main{flex:1;overflow-y:auto;display:flex;flex-direction:column;background:var(--cream)}
    .topbar{padding:18px 28px;border-bottom:1px solid var(--stone-light);display:flex;align-items:center;gap:16px;background:var(--warm-white);flex-shrink:0}
    .topbar-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:var(--charcoal)}
    .topbar-sub{font-size:12px;color:var(--stone-dark);margin-top:2px;font-weight:300}
    .topbar-actions{margin-left:auto;display:flex;gap:8px}
    .content{padding:28px;flex:1}

    /* BUTTONS */
    .btn{padding:8px 18px;border-radius:99px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .2s;display:inline-flex;align-items:center;gap:6px;letter-spacing:.02em}
    .btn-primary{background:var(--charcoal);color:var(--cream)}
    .btn-primary:hover{background:var(--charcoal-soft);transform:translateY(-1px)}
    .btn-ghost{background:transparent;border:1.5px solid var(--stone-light);color:var(--charcoal-mid)}
    .btn-ghost:hover{border-color:var(--stone);background:var(--stone-light);color:var(--charcoal)}

    /* STATS */
    .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:26px}
    .stat-card{background:var(--warm-white);border:1px solid var(--stone-light);border-radius:var(--radius);padding:18px 20px}
    .stat-label{font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone-dark);font-weight:500}
    .stat-value{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:300;color:var(--charcoal);margin-top:4px}
    .stat-meta{font-size:11px;color:var(--stone-dark);margin-top:2px;font-weight:300}

    /* CARDS */
    .card{background:var(--warm-white);border:1px solid var(--stone-light);border-radius:var(--radius);overflow:hidden;margin-bottom:16px}
    .card-header{padding:16px 20px;border-bottom:1px solid var(--stone-light);display:flex;align-items:center;gap:10px}
    .card-title{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:300;color:var(--charcoal)}
    .card-actions{margin-left:auto;display:flex;gap:8px}
    .grid-split{display:grid;grid-template-columns:2fr 1fr;gap:16px;align-items:start}
    .pill{background:var(--stone-light);color:var(--stone-dark);padding:3px 10px;border-radius:99px;font-size:11px;font-weight:500}

    /* CLASES */
    .clase-item{padding:13px 20px;border-bottom:1px solid var(--stone-light);display:flex;align-items:center;gap:14px;cursor:pointer;transition:background .15s}
    .clase-item:last-child{border-bottom:none}
    .clase-item:hover{background:var(--stone-light)}
    .clase-item.selected{background:var(--sage-pale)}
    .clase-hora{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--stone-dark);min-width:52px}
    .clase-nombre{font-size:13px;font-weight:500;color:var(--charcoal)}
    .clase-info{font-size:11px;color:var(--stone-dark);margin-top:2px;font-weight:300}
    .clase-right{margin-left:auto;display:flex;align-items:center;gap:8px}

    /* BADGES */
    .badge{padding:3px 9px;border-radius:99px;font-size:10px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
    .badge-green{background:#e8f5ee;color:#2d7a4f;border:1px solid #b8deca}
    .badge-yellow{background:#fef8e8;color:#8a6e20;border:1px solid #e8d68a}
    .badge-red{background:#fdf0ef;color:#a83232;border:1px solid #e8b8b8}
    .badge-blue{background:#eef4fb;color:#2a5c8a;border:1px solid #b8d0e8}
    .badge-stone{background:var(--stone-light);color:var(--stone-dark);border:1px solid var(--stone)}
    .badge-sage{background:var(--sage-pale);color:var(--sage);border:1px solid var(--sage-light)}

    /* TABLE */
    .table-wrap{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{text-align:left;padding:10px 20px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone-dark);font-weight:500;border-bottom:1px solid var(--stone-light)}
    td{padding:11px 20px;font-size:12px;border-bottom:1px solid var(--stone-light);color:var(--charcoal-mid)}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:var(--stone-light)}
    .td-name{color:var(--charcoal);font-weight:500}
    .avatar-xs{width:26px;height:26px;border-radius:50%;background:var(--stone-light);border:1px solid var(--stone);display:inline-flex;align-items:center;justify-content:center;font-size:10px;color:var(--stone-dark);margin-right:8px;vertical-align:middle;font-weight:500}

    /* EVALS */
    .eval-list{display:flex;flex-direction:column;gap:10px;padding:16px}
    .eval-item{background:var(--cream);border:1px solid var(--stone-light);border-radius:var(--radius-sm);padding:14px 16px}
    .eval-alumno{font-size:13px;color:var(--charcoal);font-weight:500}
    .eval-tipo{font-size:11px;color:var(--stone-dark);margin-top:2px;font-weight:300}
    .eval-tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
    .tag{background:var(--stone-light);border:1px solid var(--stone);padding:2px 8px;border-radius:4px;font-size:10px;color:var(--stone-dark)}

    /* LICENCIAS */
    .lic-item{padding:14px 20px;border-bottom:1px solid var(--stone-light);display:flex;align-items:flex-start;gap:12px}
    .lic-item:last-child{border-bottom:none}
    .lic-info{flex:1}
    .lic-name{font-size:13px;color:var(--charcoal);font-weight:500}
    .lic-motivo{font-size:11px;color:var(--stone-dark);margin-top:2px;font-weight:300}
    .lic-meta{font-size:10px;color:var(--stone);margin-top:4px}
    .lic-actions{display:flex;gap:6px;flex-shrink:0}
    .btn-sm{padding:5px 12px;border-radius:99px;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;border:none;transition:all .2s}
    .btn-approve{background:#e8f5ee;color:#2d7a4f;border:1px solid #b8deca}
    .btn-approve:hover{background:#2d7a4f;color:#fff}
    .btn-reject{background:#fdf0ef;color:#a83232;border:1px solid #e8b8b8}
    .btn-reject:hover{background:#a83232;color:#fff}

    /* MODAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(28,28,26,.5);display:flex;align-items:center;justify-content:center;z-index:100;backdrop-filter:blur(4px)}
    .modal{background:var(--warm-white);border:1px solid var(--stone-light);border-radius:16px;width:500px;max-width:95vw;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-card)}
    .modal-header{padding:22px 26px 16px;border-bottom:1px solid var(--stone-light);display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:300;color:var(--charcoal)}
    .modal-close{background:none;border:none;color:var(--stone);font-size:20px;cursor:pointer;line-height:1;padding:2px 7px;border-radius:6px;transition:all .2s}
    .modal-close:hover{color:var(--charcoal);background:var(--stone-light)}
    .modal-body{padding:20px 26px}
    .modal-footer{padding:14px 26px;border-top:1px solid var(--stone-light);display:flex;justify-content:flex-end;gap:8px}

    /* FORM */
    .form-group{margin-bottom:14px}
    .form-label{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--stone-dark);font-weight:500;margin-bottom:5px;display:block}
    .form-input,.form-select,.form-textarea{width:100%;background:var(--cream);border:1.5px solid var(--stone-light);border-radius:var(--radius-sm);padding:9px 12px;color:var(--charcoal);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .15s}
    .form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--stone)}
    .form-textarea{resize:vertical;min-height:80px}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

    /* INFO BOX */
    .info-box{background:var(--sage-pale);border:1px solid var(--sage-light);border-radius:var(--radius-sm);padding:12px 16px;font-size:12px;color:var(--sage);font-weight:300;line-height:1.5}
    .info-box strong{font-weight:500}

    /* EMPTY */
    .empty-state{padding:48px 24px;text-align:center;color:var(--stone-dark);font-size:13px;font-weight:300;line-height:1.6}
    .empty-icon{font-size:24px;margin-bottom:10px;opacity:.5}

    /* TOAST */
    .toast-wrap{position:fixed;bottom:24px;right:24px;z-index:200;display:flex;flex-direction:column;gap:8px}
    .toast{background:var(--warm-white);border:1px solid var(--stone-light);border-radius:var(--radius-sm);padding:11px 18px;font-size:13px;color:var(--charcoal);box-shadow:var(--shadow-card);display:flex;align-items:center;gap:8px;animation:slideIn .2s ease;max-width:320px}
    @keyframes slideIn{from{transform:translateX(60px);opacity:0}to{transform:none;opacity:1}}
    .toast.success{border-left:3px solid #2d7a4f}
    .toast.error{border-left:3px solid #a83232}
    .toast.info{border-left:3px solid var(--gold)}

    @media(max-width:900px){.stat-grid{grid-template-columns:repeat(2,1fr)}.grid-split{grid-template-columns:1fr}.sidebar{width:185px}}
    @media(max-width:600px){.sidebar{display:none}}
  </style>
</head>
<body>
<div id="app">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="wordmark">Lumina</div>
      <div class="sub">Portal Profesor</div>
    </div>
    <div class="nav-section" style="margin-top:8px">
      <div class="nav-label">Hoy</div>
      <button class="nav-item active" onclick="switchScreen('hoy')"><span class="nav-dot"></span>Mis Clases</button>
      <button class="nav-item" onclick="switchScreen('alumnos')"><span class="nav-dot"></span>Alumnos<span class="nav-badge" id="badge-alumnos">—</span></button>
    </div>
    <div class="nav-section" style="margin-top:14px">
      <div class="nav-label">Gestión</div>
      <button class="nav-item" onclick="switchScreen('licencias')"><span class="nav-dot"></span>Licencias<span class="nav-badge" id="badge-lic" style="display:none">0</span></button>
      <button class="nav-item" onclick="switchScreen('evaluaciones')"><span class="nav-dot"></span>Evaluaciones</button>
    </div>
    <div class="nav-spacer"></div>
    <div class="sidebar-user">
      <div class="avatar-sm" id="sb-avatar">—</div>
      <div>
        <div class="user-name" id="sb-name">Cargando…</div>
        <div class="user-role">Profesor</div>
      </div>
      <button class="btn-logout" onclick="logout()" title="Salir">↩</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="tp-title">Mis Clases de Hoy</div>
        <div class="topbar-sub" id="tp-sub">—</div>
      </div>
      <div class="topbar-actions" id="tp-actions"></div>
    </div>
    <div class="content" id="main-content">
      <div class="empty-state"><div class="empty-icon">·</div>Cargando…</div>
    </div>
  </main>
</div>

<div class="toast-wrap" id="toasts"></div>

<!-- MODAL ASISTENCIA -->
<div class="modal-overlay" id="m-asistencia" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="m-asistencia-title">Marcar Asistencia</div>
      <button class="modal-close" onclick="cm('m-asistencia')">×</button>
    </div>
    <div class="modal-body" id="m-asistencia-body">Cargando…</div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cm('m-asistencia')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarAsistencia()">Guardar Asistencia</button>
    </div>
  </div>
</div>

<!-- MODAL EVALUACION -->
<div class="modal-overlay" id="m-eval" style="display:none">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Nueva Evaluación</div>
      <button class="modal-close" onclick="cm('m-eval')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Alumna / Alumno</label><select class="form-select" id="e-alumno"><option value="">Seleccionar…</option></select></div>
      <div class="form-row">
        <div class="form-group"><label class="form-label">Fecha</label><input type="date" class="form-input" id="e-fecha"></div>
        <div class="form-group"><label class="form-label">Tipo</label><select class="form-select" id="e-tipo"><option value="inicial">Evaluación Inicial</option><option value="seguimiento">Seguimiento</option><option value="postural">Postural</option></select></div>
      </div>
      <div class="form-group"><label class="form-label">Objetivos del alumno</label><input type="text" class="form-input" id="e-obj" placeholder="Mejorar postura, fortalecer core…"></div>
      <div class="form-group"><label class="form-label">Observaciones posturales</label><textarea class="form-textarea" id="e-post" placeholder="Postura, alineación, compensaciones…"></textarea></div>
      <div class="form-group"><label class="form-label">Plan de trabajo</label><textarea class="form-textarea" id="e-plan" placeholder="Ejercicios recomendados, progresión…"></textarea></div>
      <div class="form-group"><label class="form-label">Notas adicionales</label><textarea class="form-textarea" id="e-notas" style="min-height:60px" placeholder="Comentarios libres…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="cm('m-eval')">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarEval()">Guardar Evaluación</button>
    </div>
  </div>
</div>

<!-- MODAL VER EVAL -->
<div class="modal-overlay" id="m-ver-eval" style="display:none">
  <div class="modal" style="width:540px;max-width:95vw">
    <div class="modal-header">
      <div>
        <div class="modal-title" id="ve-title">Evaluación</div>
        <div style="font-size:11px;color:var(--stone-dark);margin-top:2px" id="ve-fecha"></div>
      </div>
      <button class="modal-close" onclick="cm('m-ver-eval')">×</button>
    </div>
    <div class="modal-body" id="ve-body"></div>
    <div class="modal-footer"><button class="btn btn-ghost" onclick="cm('m-ver-eval')">Cerrar</button></div>
  </div>
</div>

<script>
const SB_URL = 'https://yeaejlbahtkrrsttbprb.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InllYWVqbGJhaHRrcnJzdHRicHJiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg5Nzk3NTIsImV4cCI6MjA5NDU1NTc1Mn0.gpzc8sNIifOtfbA02nITKF9od8B9thSXlOyKrlA3ic0';
const sb = supabase.createClient(SB_URL, SB_KEY);

let PROF=null, CLASES=[], ALUMNOS=[], LICENCIAS=[], EVALS=[], SELECTED=null, SCREEN='hoy', ASIST={};

window.addEventListener('DOMContentLoaded', async ()=>{
  const {data:{session}} = await sb.auth.getSession();
  if(!session){location.href='/index.html';return}
  const {data:p} = await sb.from('perfiles').select('*').eq('id',session.user.id).single();
  if(!p||(p.rol!=='profesor'&&p.rol!=='admin')){toast('Acceso denegado','error');setTimeout(()=>location.href='/index.html',2000);return}
  PROF=p;
  document.getElementById('sb-avatar').textContent=(p.nombre[0]+p.apellido[0]).toUpperCase();
  document.getElementById('sb-name').textContent=p.nombre+' '+p.apellido;
  const hoyStr=new Date().toLocaleDateString('es-BO',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('tp-sub').textContent=hoyStr.charAt(0).toUpperCase()+hoyStr.slice(1);
  await Promise.all([loadClases(),loadAlumnos(),loadLicencias(),loadEvals()]);
  switchScreen('hoy');
});

async function loadClases(){
  const hoy=new Date().toISOString().split('T')[0];
  const {data}=await sb.from('clases').select('*').eq('profesor_id',PROF.id)
    .gte('fecha_hora',hoy+'T00:00:00').lte('fecha_hora',hoy+'T23:59:59').order('fecha_hora');
  CLASES=data||[];
}
async function loadAlumnos(){
  const {data}=await sb.from('perfiles').select('*,membresias(estado,plan_id,creditos_restantes,fecha_fin,planes(nombre))').eq('rol','alumno').eq('activo',true).order('nombre');
  ALUMNOS=data||[];
  document.getElementById('badge-alumnos').textContent=ALUMNOS.length;
}
async function loadLicencias(){
  const {data}=await sb.from('licencias').select('*,perfiles!licencias_alumno_id_fkey(nombre,apellido)').eq('estado','pendiente').order('created_at');
  LICENCIAS=data||[];
  const b=document.getElementById('badge-lic');
  if(LICENCIAS.length>0){b.textContent=LICENCIAS.length;b.style.display=''}else b.style.display='none';
}
async function loadEvals(){
  const {data}=await sb.from('evaluaciones').select('*,perfiles!evaluaciones_alumno_id_fkey(nombre,apellido)').eq('profesor_id',PROF.id).order('created_at',{ascending:false}).limit(30);
  EVALS=data||[];
}
async function loadReservas(cid){
  const {data}=await sb.from('reservas').select('*,perfiles!reservas_alumno_id_fkey(nombre,apellido)').eq('clase_id',cid).neq('estado','cancelada');
  return data||[];
}

function switchScreen(s){
  SCREEN=s;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  [{hoy:0,alumnos:1,licencias:2,evaluaciones:3}[s]].forEach(i=>document.querySelectorAll('.nav-item')[i]?.classList.add('active'));
  document.getElementById('tp-title').textContent={hoy:'Mis Clases de Hoy',alumnos:'Alumnos Activos',licencias:'Licencias Pendientes',evaluaciones:'Evaluaciones'}[s]||'';
  document.getElementById('tp-actions').innerHTML=s==='evaluaciones'?`<button class="btn btn-primary" onclick="openEval()">+ Nueva evaluación</button>`:'';
  ({hoy:renderHoy,alumnos:renderAlumnos,licencias:renderLicencias,evaluaciones:renderEvals}[s])?.();
}

function renderHoy(){
  if(!CLASES.length){
    set(`<div class="stat-grid">${sc('Clases hoy','0','Sin programadas')}${sc('Alumnos',ALUMNOS.length,'En el sistema')}${sc('Licencias',LICENCIAS.length,'Pendientes')}${sc('Evaluaciones',EVALS.length,'Realizadas')}</div><div class="card"><div class="empty-state"><div class="empty-icon">☀️</div>No tenés clases programadas para hoy.</div></div>`);
    return;
  }
  const now=new Date();
  const items=CLASES.map(c=>{
    const f=new Date(c.fecha_hora);
    const h=f.toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit'});
    const bd=f<new Date(now-3600000)?'<span class="badge badge-stone">Pasada</span>':f>now?'<span class="badge badge-blue">Próxima</span>':'<span class="badge badge-green">En curso</span>';
    return `<div class="clase-item${SELECTED?.id===c.id?' selected':''}" onclick="selectClase('${c.id}')">
      <div class="clase-hora">${h}</div>
      <div><div class="clase-nombre">${c.nombre}</div><div class="clase-info">${c.modalidad||'Reformer'} · Cap. ${c.capacidad||'—'}</div></div>
      <div class="clase-right">${bd}<span style="color:var(--stone);font-size:18px">›</span></div>
    </div>`;
  }).join('');
  set(`<div class="stat-grid">${sc('Clases hoy',CLASES.length,'Programadas')}${sc('Alumnos',ALUMNOS.length,'En el sistema')}${sc('Licencias',LICENCIAS.length,'Pendientes')}${sc('Evaluaciones',EVALS.length,'Realizadas')}</div>
  <div class="grid-split">
    <div class="card"><div class="card-header"><div class="card-title">Clases del día</div><div class="card-actions"><span class="pill">${CLASES.length} clase${CLASES.length!==1?'s':''}</span></div></div>${items}</div>
    <div id="detail-panel"><div class="card"><div class="empty-state"><div class="empty-icon">↑</div>Seleccioná una clase</div></div></div>
  </div>`);
}

async function selectClase(id){
  SELECTED=CLASES.find(c=>c.id===id);
  document.getElementById('detail-panel').innerHTML=`<div class="card"><div class="empty-state"><div class="empty-icon">·</div>Cargando alumnos…</div></div>`;
  const reservas=await loadReservas(id);
  const h=new Date(SELECTED.fecha_hora).toLocaleTimeString('es-BO',{hour:'2-digit',minute:'2-digit'});
  const rows=reservas.length>0?reservas.map(r=>{
    const nom=r.perfiles?`${r.perfiles.nombre} ${r.perfiles.apellido}`:'—';
    const ini=r.perfiles?(r.perfiles.nombre[0]+r.perfiles.apellido[0]).toUpperCase():'?';
    const eb={confirmada:'<span class="badge badge-green">Presente</span>',licencia:'<span class="badge badge-yellow">Licencia</span>',recuperacion:'<span class="badge badge-blue">Recup.</span>',ausente:'<span class="badge badge-red">Ausente</span>'}[r.estado]||`<span class="badge badge-stone">${r.estado}</span>`;
    return `<tr><td class="td-name"><span class="avatar-xs">${ini}</span>${nom}</td><td>${eb}</td><td><a onclick="abrirEvalPara('${r.alumno_id}','${nom}')" style="color:var(--gold-muted);cursor:pointer;font-size:11px">+ Eval</a></td></tr>`;
  }).join(''):`<tr><td colspan="3" style="text-align:center;padding:24px;color:var(--stone)">Sin reservas confirmadas</td></tr>`;
  document.getElementById('detail-panel').innerHTML=`<div class="card"><div class="card-header"><div><div class="card-title">${SELECTED.nombre}</div><div style="font-size:11px;color:var(--stone-dark);margin-top:2px">${h} · ${reservas.length} alumno${reservas.length!==1?'s':''}</div></div><div class="card-actions"><button class="btn btn-primary" onclick="openMarcarAsistencia()">✓ Asistencia</button></div></div><div class="table-wrap"><table><thead><tr><th>Alumno/a</th><th>Estado</th><th></th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
  renderHoy();
}

function renderAlumnos(){
  if(!ALUMNOS.length){set(`<div class="card"><div class="empty-state"><div class="empty-icon">👥</div>Sin alumnos activos</div></div>`);return}
  const rows=ALUMNOS.map(a=>{
    const m=a.membresias?.[0];
    const plan=m?.planes?.nombre||'—';
    const cred=m?.creditos_restantes??'—';
    const eb={activa:'<span class="badge badge-green">Activa</span>',vencida:'<span class="badge badge-red">Vencida</span>',suspendida:'<span class="badge badge-yellow">Suspendida</span>'}[m?.estado]||'<span class="badge badge-stone">—</span>';
    const ini=(a.nombre[0]+a.apellido[0]).toUpperCase();
    const fin=m?.fecha_fin?new Date(m.fecha_fin).toLocaleDateString('es-BO'):'—';
    return `<tr><td class="td-name"><span class="avatar-xs">${ini}</span>${a.nombre} ${a.apellido}</td><td>${plan}</td><td style="font-variant-numeric:tabular-nums;color:var(--gold-muted);font-weight:500">${cred}</td><td>${eb}</td><td style="color:var(--stone-dark)">${fin}</td><td><a onclick="abrirEvalPara('${a.id}','${a.nombre} ${a.apellido}')" style="color:var(--gold-muted);cursor:pointer;font-size:11px;margin-right:8px">+ Eval</a><a onclick="verHistorial('${a.id}','${a.nombre} ${a.apellido}')" style="color:var(--stone-dark);cursor:pointer;font-size:11px">Historial</a></td></tr>`;
  }).join('');
  set(`<div class="card"><div class="card-header"><div class="card-title">Alumnos Activos</div><div class="card-actions"><span class="pill">${ALUMNOS.length} alumno${ALUMNOS.length!==1?'s':''}</span></div></div><div class="table-wrap"><table><thead><tr><th>Nombre</th><th>Plan</th><th>Créditos</th><th>Membresía</th><th>Vence</th><th>Acciones</th></tr></thead><tbody>${rows}</tbody></table></div></div>`);
}

function renderLicencias(){
  if(!LICENCIAS.length){set(`<div class="card"><div class="empty-state"><div class="empty-icon">✓</div>No hay licencias pendientes de revisión.</div></div>`);return}
  const items=LICENCIAS.map(l=>{
    const nom=l.perfiles?`${l.perfiles.nombre} ${l.perfiles.apellido}`:'—';
    const fc=new Date(l.fecha_clase).toLocaleDateString('es-BO',{weekday:'short',day:'numeric',month:'short'});
    const sol=new Date(l.created_at).toLocaleString('es-BO',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
    return `<div class="lic-item"><div class="lic-info"><div class="lic-name">${nom}</div><div class="lic-motivo">Clase: ${fc} · ${l.motivo||'Sin motivo'}</div><div class="lic-meta">Solicitada: ${sol}</div></div><div class="lic-actions"><button class="btn-sm btn-approve" onclick="resolverLic('${l.id}','aprobada')">✓ Aprobar</button><button class="btn-sm btn-reject" onclick="resolverLic('${l.id}','rechazada')">✕ Rechazar</button></div></div>`;
  }).join('');
  set(`<div class="card"><div class="card-header"><div class="card-title">Licencias Pendientes</div><div class="card-actions"><span class="pill">${LICENCIAS.length} pendiente${LICENCIAS.length!==1?'s':''}</span></div></div>${items}</div><div class="info-box" style="margin-top:12px"><strong>Regla:</strong> Los alumnos pueden solicitar licencia hasta 2 horas antes de la clase. Las aprobadas devuelven el crédito.</div>`);
}
async function resolverLic(id,estado){
  const {error}=await sb.from('licencias').update({estado}).eq('id',id);
  if(error){toast('Error: '+error.message,'error');return}
  toast(estado==='aprobada'?'✓ Licencia aprobada':'Licencia rechazada',estado==='aprobada'?'success':'info');
  await loadLicencias();renderLicencias();
}

function renderEvals(){
  const items=EVALS.map(e=>{
    const nom=e.perfiles?`${e.perfiles.nombre} ${e.perfiles.apellido}`:'—';
    const f=new Date(e.created_at).toLocaleDateString('es-BO',{day:'numeric',month:'long',year:'numeric'});
    return `<div class="eval-item"><div style="display:flex;align-items:center;justify-content:space-between"><div class="eval-alumno">${nom}</div><div style="font-size:10px;color:var(--stone)">${f}</div></div><div class="eval-tipo">${e.tipo||'Evaluación'}</div>${e.objetivos?`<div class="eval-tags"><span class="tag">${e.objetivos.slice(0,50)}${e.objetivos.length>50?'…':''}</span></div>`:''}<div style="margin-top:8px"><a onclick='verEval(${JSON.stringify(e).replace(/'/g,"\\'")})'  style="font-size:11px;color:var(--gold-muted);cursor:pointer">Ver detalles ›</a></div></div>`;
  }).join('');
  set(EVALS.length?`<div class="card"><div class="card-header"><div class="card-title">Historial de Evaluaciones</div><div class="card-actions"><span class="pill">${EVALS.length}</span></div></div><div class="eval-list">${items}</div></div>`:`<div class="card"><div class="empty-state"><div class="empty-icon">📊</div>Sin evaluaciones registradas aún.</div></div>`);
}

async function openMarcarAsistencia(){
  if(!SELECTED){toast('Seleccioná una clase primero','info');return}
  document.getElementById('m-asistencia-title').textContent=SELECTED.nombre;
  document.getElementById('m-asistencia').style.display='flex';
  const reservas=await loadReservas(SELECTED.id);
  ASIST[SELECTED.id]={};
  if(!reservas.length){document.getElementById('m-asistencia-body').innerHTML=`<div class="empty-state" style="padding:20px">Sin alumnos inscriptos.</div>`;return}
  const rows=reservas.map(r=>{
    const nom=r.perfiles?`${r.perfiles.nombre} ${r.perfiles.apellido}`:'—';
    ASIST[SELECTED.id][r.id]=r.estado;
    return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--stone-light)"><div style="flex:1;font-size:13px;color:var(--charcoal)">${nom}</div><select style="background:var(--cream);border:1.5px solid var(--stone-light);border-radius:8px;padding:5px 9px;color:var(--charcoal);font-family:'DM Sans',sans-serif;font-size:12px;outline:none" onchange="ASIST['${SELECTED.id}']['${r.id}']=this.value"><option value="confirmada" ${r.estado==='confirmada'?'selected':''}>Presente</option><option value="ausente" ${r.estado==='ausente'?'selected':''}>Ausente</option><option value="licencia" ${r.estado==='licencia'?'selected':''}>Licencia</option><option value="recuperacion" ${r.estado==='recuperacion'?'selected':''}>Recuperación</option></select></div>`;
  }).join('');
  document.getElementById('m-asistencia-body').innerHTML=`<div style="font-size:12px;color:var(--stone-dark);margin-bottom:12px">${reservas.length} alumno${reservas.length!==1?'s':''} inscriptos</div>${rows}`;
}
async function guardarAsistencia(){
  if(!SELECTED)return;
  await Promise.all(Object.entries(ASIST[SELECTED.id]||{}).map(([rid,estado])=>sb.from('reservas').update({estado}).eq('id',rid)));
  toast('✓ Asistencia guardada','success');cm('m-asistencia');
}

function openEval(){
  const sel=document.getElementById('e-alumno');
  sel.innerHTML='<option value="">Seleccionar alumno…</option>'+ALUMNOS.map(a=>`<option value="${a.id}">${a.nombre} ${a.apellido}</option>`).join('');
  document.getElementById('e-fecha').value=new Date().toISOString().split('T')[0];
  ['e-obj','e-post','e-plan','e-notas'].forEach(i=>document.getElementById(i).value='');
  document.getElementById('m-eval').style.display='flex';
}
function abrirEvalPara(aid,nom){
  openEval();setTimeout(()=>document.getElementById('e-alumno').value=aid,50);
}
async function guardarEval(){
  const aid=document.getElementById('e-alumno').value;
  if(!aid){toast('Seleccioná un alumno','error');return}
  const {error}=await sb.from('evaluaciones').insert({alumno_id:aid,profesor_id:PROF.id,tipo:document.getElementById('e-tipo').value,objetivos:document.getElementById('e-obj').value,observaciones_posturales:document.getElementById('e-post').value,plan_trabajo:document.getElementById('e-plan').value,notas:document.getElementById('e-notas').value});
  if(error){toast('Error: '+error.message,'error');return}
  toast('✓ Evaluación guardada','success');cm('m-eval');
  await loadEvals();if(SCREEN==='evaluaciones')renderEvals();
}

function verEval(e){
  document.getElementById('ve-title').textContent=e.perfiles?`${e.perfiles.nombre} ${e.perfiles.apellido}`:'Evaluación';
  document.getElementById('ve-fecha').textContent=new Date(e.created_at).toLocaleDateString('es-BO',{weekday:'long',day:'numeric',month:'long',year:'numeric'})+' · '+(e.tipo||'Evaluación');
  const row=(l,v)=>v?`<div style="margin-bottom:16px"><div style="font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--stone-dark);font-weight:500;margin-bottom:5px">${l}</div><div style="font-size:13px;color:var(--charcoal);line-height:1.6;font-weight:300">${v}</div></div>`:'';
  document.getElementById('ve-body').innerHTML=row('Objetivos',e.objetivos)+row('Observaciones posturales',e.observaciones_posturales)+row('Plan de trabajo',e.plan_trabajo)+row('Notas',e.notas);
  document.getElementById('m-ver-eval').style.display='flex';
}
async function verHistorial(aid,nom){
  const ev=EVALS.filter(e=>e.alumno_id===aid);
  document.getElementById('ve-title').textContent=nom;
  document.getElementById('ve-fecha').textContent=`${ev.length} evaluación${ev.length!==1?'es':''}`;
  document.getElementById('ve-body').innerHTML=ev.length?ev.map(e=>{
    const f=new Date(e.created_at).toLocaleDateString('es-BO',{day:'numeric',month:'long',year:'numeric'});
    return `<div style="border:1px solid var(--stone-light);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;color:var(--charcoal);font-weight:500">${e.tipo||'Evaluación'}</span><span style="font-size:10px;color:var(--stone)">${f}</span></div>${e.objetivos?`<div style="font-size:12px;color:var(--stone-dark);line-height:1.5;font-weight:300">${e.objetivos.slice(0,120)}${e.objetivos.length>120?'…':''}</div>`:''}<div style="margin-top:8px"><a onclick='verEval(${JSON.stringify(e).replace(/'/g,"\\'")})'  style="font-size:11px;color:var(--gold-muted);cursor:pointer">Ver completa ›</a></div></div>`;
  }).join(''):`<div class="empty-state" style="padding:20px">Sin evaluaciones previas.</div>`;
  document.getElementById('m-ver-eval').style.display='flex';
}

function set(html){document.getElementById('main-content').innerHTML=html}
function sc(l,v,m){return `<div class="stat-card"><div class="stat-label">${l}</div><div class="stat-value">${v}</div><div class="stat-meta">${m}</div></div>`}
function cm(id){document.getElementById(id).style.display='none'}
function toast(msg,type='info'){const el=document.createElement('div');el.className=`toast ${type}`;el.textContent=msg;document.getElementById('toasts').appendChild(el);setTimeout(()=>el.remove(),3500)}
async function logout(){await sb.auth.signOut();location.href='/index.html'}
</script>
</body>
</html>
